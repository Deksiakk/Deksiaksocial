<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deksiakweb - Linki</title>
    <style>
        body {
            background-color: #121214;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
        }
        h1 {
            color: #fff;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        p {
            color: #a0a0a5;
            font-size: 1.1rem;
            margin-bottom: 40px;
        }
        .links-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            max-width: 400px;
            margin: 0 auto;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
            color: white;
            border-radius: 10px;
            transition: transform 0.2s, background-color 0.2s;
            box-sizing: border-box;
        }
        .btn:hover {
            transform: scale(1.03);
        }
        .btn-yt {
            background-color: #ff0000;
        }
        .btn-yt:hover {
            background-color: #dd0000;
        }
        .btn-dc {
            background-color: #5865F2;
        }
        .btn-dc:hover {
            background-color: #454fbf;
        }
    </style>
</head>
<body>

    <h1>Deksiakweb</h1>
    <p>Siemanko! Wpadaj na moje social media:</p>

    <div class="links-container">
        <!-- Tutaj wpiszemy potem Twoje prawdziwe linki zamiast # -->
        <a href="#" target="_blank" class="btn btn-yt">Kanał YouTube</a>
        <a href="#" target="_blank" class="btn btn-dc">Serwer Discord</a>
    </div>

</body>
</html>
